controller_manager:
  ros__parameters:
    update_rate: 100 # Hz

joint_state_broadcaster:
  ros__parameters:
    type: joint_state_broadcaster/JointStateBroadcaster

garmi_arm_0_controller:
  ros__parameters:
    type: joint_trajectory_controller/JointTrajectoryController
    use_sim_time: True
    joints:
      - arm_0_fr3_joint1
      - arm_0_fr3_joint2
      - arm_0_fr3_joint3
      - arm_0_fr3_joint4
      - arm_0_fr3_joint5
      - arm_0_fr3_joint6
      - arm_0_fr3_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    gains:
      arm_0_fr3_joint1: { p: 600., d: 30., i: 0., i_clamp: 1. }
      arm_0_fr3_joint2: { p: 600., d: 30., i: 0., i_clamp: 1. }
      arm_0_fr3_joint3: { p: 600., d: 30., i: 0., i_clamp: 1. }
      arm_0_fr3_joint4: { p: 600., d: 30., i: 0., i_clamp: 1. }
      arm_0_fr3_joint5: { p: 250., d: 10., i: 0., i_clamp: 1. }
      arm_0_fr3_joint6: { p: 150., d: 10., i: 0., i_clamp: 1. }
      arm_0_fr3_joint7: { p: 50., d: 5., i: 0., i_clamp: 1. }

garmi_arm_1_controller:
  ros__parameters:
    type: joint_trajectory_controller/JointTrajectoryController
    use_sim_time: True
    joints:
      - arm_1_fr3_joint1
      - arm_1_fr3_joint2
      - arm_1_fr3_joint3
      - arm_1_fr3_joint4
      - arm_1_fr3_joint5
      - arm_1_fr3_joint6
      - arm_1_fr3_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    gains:
      arm_1_fr3_joint1: { p: 600., d: 30., i: 0., i_clamp: 1. }
      arm_1_fr3_joint2: { p: 600., d: 30., i: 0., i_clamp: 1. }
      arm_1_fr3_joint3: { p: 600., d: 30., i: 0., i_clamp: 1. }
      arm_1_fr3_joint4: { p: 600., d: 30., i: 0., i_clamp: 1. }
      arm_1_fr3_joint5: { p: 250., d: 10., i: 0., i_clamp: 1. }
      arm_1_fr3_joint6: { p: 150., d: 10., i: 0., i_clamp: 1. }
      arm_1_fr3_joint7: { p: 50., d: 5., i: 0., i_clamp: 1. }

garmi_head_controller:
  ros__parameters:
    type: joint_trajectory_controller/JointTrajectoryController
    use_sim_time: True
    joints:
      - head_pan_joint
      - head_tilt_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

garmi_lift_controller:
  ros__parameters:
    type: joint_trajectory_controller/JointTrajectoryController
    use_sim_time: True
    joints:
      - lift_0_lower_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

garmi_base_controller:
  ros__parameters:
    use_sim_time: True
    interface_name: velocity

    command_joint_names: ["front_left_wheel_joint", "rear_left_wheel_joint", "rear_right_wheel_joint", "front_right_wheel_joint"]

    front_left_wheel_command_joint_name: "front_left_wheel_joint"
    front_right_wheel_command_joint_name: "front_right_wheel_joint"
    rear_right_wheel_command_joint_name: "rear_right_wheel_joint"
    rear_left_wheel_command_joint_name: "rear_left_wheel_joint"

    kinematics.base_frame_offset: { x: 0.0, y: 0.0, theta: 0.0 }
    kinematics.wheels_radius: 0.0759
    kinematics.sum_of_robot_center_projection_on_X_Y_axis: 0.59
    wheel_separation_multiplier: 1.0
    wheel_radius_multiplier: 1.0

    publish_rate: 20.0
    reference_timeout: 2.0
    use_stamped_vel: False

    pose_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.03]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 1000000.0, 1000000.0, 0.03]

    cmd_vel_timeout: 0.5

    base_frame_id: "base_link"
    odom_frame_id: "odom"
    enable_odom_tf: false
    tf_frame_prefix_enable: false

    # Velocity and acceleration limits
    # Whenever a min_* is unspecified, default to -max_*
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.has_jerk_limits: false
    linear.x.max_velocity: 1.3
    linear.x.min_velocity: -1.3
    linear.x.max_acceleration: 1.0
    linear.x.min_acceleration: -1.0
    linear.x.max_jerk: 0.0
    linear.x.min_jerk: 0.0

    linear.y.has_velocity_limits: true
    linear.y.has_acceleration_limits: true
    linear.y.has_jerk_limits: false
    linear.y.max_velocity: 1.3
    linear.y.min_velocity: -1.3
    linear.y.max_acceleration: 1.0
    linear.y.min_acceleration: -1.0
    linear.y.max_jerk: 0.0
    linear.y.min_jerk: 0.0

    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.has_jerk_limits: false
    angular.z.max_velocity: 4.0
    angular.z.min_velocity: -4.0
    angular.z.max_acceleration: 2.0
    angular.z.min_acceleration: -2.0
    angular.z.max_jerk: 0.0
    angular.z.min_jerk: 0.0